<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Chat Dashboard</title>
  <style>
    :root {
      --bg: #faf7ff;
      --bg-2: #f3edff;
      --surface: #ffffff;
      --surface-2: #faf8ff;
      --border: #ece5fa;
      --text: #1f1235;
      --text-dim: #6b5e85;
      --primary: #c026d3;
      --primary-2: #ec4899;
      --primary-soft: #fce7f3;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 10px 30px -10px rgba(192, 38, 211, 0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ========== LOGIN ========== */
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: var(--shadow);
    }
    .login-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 28px;
      box-shadow: 0 8px 20px -4px rgba(192, 38, 211, 0.4);
    }
    .login-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 28px;
    }
    .field {
      display: block;
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--surface-2);
      transition: all 0.15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px var(--primary-soft);
    }
    .btn-primary {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      margin-top: 8px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(192, 38, 211, 0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-err {
      background: #fef2f2;
      color: var(--danger);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      text-align: center;
    }
    .login-err.show { display: block; }

    /* ========== DASHBOARD ========== */
    .dash {
      display: none;
      grid-template-columns: 360px 1fr;
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
    }
    .dash.show { display: grid; }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 18px;
    }
    .brand-text { font-weight: 700; font-size: 15px; }
    .brand-sub { font-size: 11px; color: var(--text-dim); }
    .logout-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-dim);
      font-weight: 500;
      transition: all 0.15s;
    }
    .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

    .stats-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 14px 20px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .stat-mini {
      text-align: center;
    }
    .stat-mini .num {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-mini .lbl {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .sessions {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .session-item {
      padding: 12px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .session-item:hover { background: var(--surface-2); }
    .session-item.active {
      background: var(--primary-soft);
      border-left-color: var(--primary);
    }
    .session-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .session-id {
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .session-time {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .session-preview {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 11px;
      color: var(--text-dim);
    }
    .badge-count {
      display: inline-block;
      padding: 2px 7px;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }

    .empty-list {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ========== DETAIL PANEL ========== */
    .detail {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .detail-head {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .detail-title {
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detail-id {
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface-2);
      padding: 3px 8px;
      border-radius: 6px;
    }
    .refresh-info {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .msg {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      max-width: 80%;
    }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .msg.assistant .msg-avatar { background: linear-gradient(135deg, var(--primary), var(--primary-2)); }
    .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .msg-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .msg.user .msg-meta { text-align: right; }

    .empty-detail {
      flex: 1;
      display: grid;
      place-items: center;
      color: var(--text-dim);
      text-align: center;
    }
    .empty-detail-icon { font-size: 56px; margin-bottom: 12px; opacity: 0.4; }

    .refresh-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text);
      font-weight: 500;
    }
    .refresh-btn:hover { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4c8e8; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b8a4dc; }

    @media (max-width: 768px) {
      .dash { grid-template-columns: 1fr; grid-template-rows: 280px 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <form class="login-card" id="loginForm">
      <div class="login-logo">💬</div>
      <h1 class="login-title">Admin Dashboard</h1>
      <p class="login-sub">Đăng nhập để xem các cuộc hội thoại</p>

      <label class="field">
        <label>Tài khoản</label>
        <input type="text" id="loginUser" autocomplete="username" required />
      </label>
      <label class="field">
        <label>Mật khẩu</label>
        <input type="password" id="loginPass" autocomplete="current-password" required />
      </label>

      <button type="submit" class="btn-primary" id="loginBtn">Đăng nhập</button>
      <div class="login-err" id="loginErr"></div>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div class="dash" id="dash">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <div class="brand-icon">💬</div>
          <div>
            <div class="brand-text">Chat Admin</div>
            <div class="brand-sub">profile-tinh-an</div>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Đăng xuất</button>
      </div>

      <div class="stats-bar">
        <div class="stat-mini">
          <div class="num" id="statSessions">—</div>
          <div class="lbl">Sessions</div>
        </div>
        <div class="stat-mini">
          <div class="num" id="statMessages">—</div>
          <div class="lbl">Tin nhắn</div>
        </div>
      </div>

      <div class="sessions" id="sessions">
        <div class="empty-list">Đang tải...</div>
      </div>
    </aside>

    <main class="detail">
      <div class="detail-head">
        <div class="detail-title">
          <span id="detailTitle">Chọn một cuộc hội thoại</span>
          <span class="detail-id" id="detailId" style="display:none"></span>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="refresh-info">
            <span class="live-dot"></span>
            Tự động cập nhật mỗi 10s
          </span>
          <button class="refresh-btn" id="refreshBtn">↻ Làm mới</button>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="empty-detail">
          <div>
            <div class="empty-detail-icon">💌</div>
            <div>Chọn session bên trái để xem chi tiết</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = '';
    const TOKEN_KEY = 'adminToken';

    const loginWrap = document.getElementById('loginWrap');
    const dash = document.getElementById('dash');
    const loginForm = document.getElementById('loginForm');
    const loginUser = document.getElementById('loginUser');
    const loginPass = document.getElementById('loginPass');
    const loginBtn = document.getElementById('loginBtn');
    const loginErr = document.getElementById('loginErr');
    const logoutBtn = document.getElementById('logoutBtn');
    const sessionsEl = document.getElementById('sessions');
    const messagesEl = document.getElementById('messages');
    const detailTitle = document.getElementById('detailTitle');
    const detailId = document.getElementById('detailId');
    const refreshBtn = document.getElementById('refreshBtn');
    const statSessions = document.getElementById('statSessions');
    const statMessages = document.getElementById('statMessages');

    let currentSession = null;
    let autoRefreshTimer = null;

    function getToken() {
      try { return sessionStorage.getItem(TOKEN_KEY); } catch (_) { return null; }
    }
    function setToken(t) {
      try { sessionStorage.setItem(TOKEN_KEY, t); } catch (_) {}
    }
    function clearToken() {
      try { sessionStorage.removeItem(TOKEN_KEY); } catch (_) {}
    }

    function showLogin() {
      loginWrap.style.display = 'grid';
      dash.classList.remove('show');
      clearToken();
      currentSession = null;
      if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
    }
    function showDash() {
      loginWrap.style.display = 'none';
      dash.classList.add('show');
      loadSessions();
      startAutoRefresh();
    }

    function showLoginErr(msg) {
      loginErr.textContent = msg;
      loginErr.classList.add('show');
    }
    function hideLoginErr() {
      loginErr.classList.remove('show');
      loginErr.textContent = '';
    }

    async function apiFetch(path, opts = {}) {
      const token = getToken();
      const headers = Object.assign({}, opts.headers || {});
      if (token) headers['Authorization'] = 'Bearer ' + token;
      if (opts.body && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
      let res;
      try {
        res = await fetch(API + path, Object.assign({}, opts, { headers }));
      } catch (e) {
        throw new Error('Không kết nối được server: ' + e.message);
      }
      if (res.status === 401) {
        showLogin();
        throw new Error('Unauthorized');
      }
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || ('HTTP ' + res.status));
      }
      const text = await res.text();
      if (!text) {
        throw new Error('Server trả về phản hồi rỗng');
      }
      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error('Phản hồi không phải JSON: ' + text.slice(0, 80));
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideLoginErr();
      loginBtn.disabled = true;
      loginBtn.textContent = 'Đang đăng nhập...';
      try {
        const data = await fetch(API + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: loginUser.value.trim(), password: loginPass.value }),
        }).then(async (r) => {
          const d = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(d.error || ('Đăng nhập thất bại (HTTP ' + r.status + ')'));
          if (!d.token) throw new Error('Phản hồi không hợp lệ từ server');
          return d;
        });
        setToken(data.token);
        loginPass.value = '';
        showDash();
      } catch (err) {
        showLoginErr(err.message);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Đăng nhập';
      }
    });

    logoutBtn.addEventListener('click', () => {
      if (confirm('Đăng xuất khỏi admin?')) showLogin();
    });

    refreshBtn.addEventListener('click', () => {
      loadSessions();
      if (currentSession) loadMessages(currentSession);
    });

    function fmtTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const isToday = d.toDateString() === now.toDateString();
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      if (isToday) return hh + ':' + mm;
      const dd = String(d.getDate()).padStart(2, '0');
      const mo = String(d.getMonth() + 1).padStart(2, '0');
      return dd + '/' + mo + ' ' + hh + ':' + mm;
    }
    function fmtRel(ts) {
      const diff = Date.now() - ts;
      const m = Math.floor(diff / 60000);
      if (m < 1) return 'vừa xong';
      if (m < 60) return m + ' phút';
      const h = Math.floor(m / 60);
      if (h < 24) return h + ' giờ';
      const d = Math.floor(h / 24);
      if (d < 30) return d + ' ngày';
      return Math.floor(d / 30) + ' tháng';
    }
    function escapeHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function shortId(id) {
      if (!id) return '';
      return id.replace(/^sess_/, '');
    }

    async function loadStats() {
      try {
        const data = await apiFetch('/api/admin/stats');
        statSessions.textContent = data.totalSessions ?? 0;
        statMessages.textContent = data.totalMessages ?? 0;
      } catch (_) {
        statSessions.textContent = '—';
        statMessages.textContent = '—';
      }
    }

    async function loadSessions() {
      try {
        const data = await apiFetch('/api/admin/sessions');
        const list = data.sessions || [];
        loadStats();
        if (!list.length) {
          sessionsEl.innerHTML = '<div class="empty-list">Chưa có cuộc hội thoại nào 💤</div>';
          return;
        }
        sessionsEl.innerHTML = list.map((s) => {
          const lastMsg = s.lastMessage || '';
          const isActive = currentSession === s.session_id;
          return `
            <div class="session-item ${isActive ? 'active' : ''}" data-id="${escapeHtml(s.session_id)}">
              <div class="session-top">
                <span class="session-id">sess_${escapeHtml(shortId(s.session_id))}</span>
                <span class="session-time">${fmtRel(s.last_message_at)}</span>
              </div>
              <div class="session-preview">${escapeHtml(lastMsg)}</div>
              <div class="session-meta">
                <span class="badge-count">${s.message_count} tin</span>
                · ${fmtTime(s.last_message_at)}
              </div>
            </div>
          `;
        }).join('');
        sessionsEl.querySelectorAll('.session-item').forEach((el) => {
          el.addEventListener('click', () => {
            currentSession = el.dataset.id;
            sessionsEl.querySelectorAll('.session-item').forEach((n) => n.classList.remove('active'));
            el.classList.add('active');
            loadMessages(currentSession);
          });
        });
      } catch (err) {
        sessionsEl.innerHTML = '<div class="empty-list">Lỗi tải sessions: ' + escapeHtml(err.message) + '</div>';
      }
    }

    async function loadMessages(sessionId) {
      detailId.textContent = 'sess_' + shortId(sessionId);
      detailId.style.display = 'inline-block';
      detailTitle.textContent = 'Cuộc hội thoại';
      try {
        const data = await apiFetch('/api/admin/messages?session_id=' + encodeURIComponent(sessionId));
        const msgs = data.messages || [];
        if (!msgs.length) {
          messagesEl.innerHTML = '<div class="empty-detail"><div><div class="empty-detail-icon">📭</div><div>Session trống</div></div></div>';
          return;
        }
        messagesEl.innerHTML = msgs.map((m) => {
          const initials = m.role === 'user' ? 'U' : 'AI';
          const name = m.role === 'user' ? 'Khách' : 'Tiến';
          return `
            <div class="msg ${m.role}">
              <div class="msg-avatar">${initials}</div>
              <div>
                <div class="msg-bubble">${escapeHtml(m.text)}</div>
                <div class="msg-meta">${name} · ${fmtTime(m.created_at)}</div>
              </div>
            </div>
          `;
        }).join('');
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } catch (err) {
        messagesEl.innerHTML = '<div class="empty-detail"><div>Lỗi: ' + escapeHtml(err.message) + '</div></div>';
      }
    }

    function startAutoRefresh() {
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(() => {
        loadSessions();
        if (currentSession) loadMessages(currentSession);
      }, 10000);
    }

    // Boot
    if (getToken()) {
      showDash();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
